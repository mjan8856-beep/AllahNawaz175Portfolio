<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Allah Nawaz — Product Designer | UI/UX Executive</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050505;
            --surface: #0E0E0E;
            --card: #161616;
            --accent: #D4F40C; 
            --accent-muted: rgba(212, 244, 12, 0.1);
            --border: rgba(255, 255, 255, 0.08);
            --text-high: #FFFFFF;
            --text-med: #A0A0A0;
            --text-low: #555555;
            --font-display: 'Syne', sans-serif;
            --font-body: 'Inter', sans-serif;
            --ease: cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body { 
            background: var(--bg); 
            color: var(--text-high); 
            font-family: var(--font-body); 
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 5vw; }
        section { padding: 100px 0; }
        
        .reveal { opacity: 0; transform: translateY(40px); transition: 1s var(--ease); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* ════════════ NAV ════════════ */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000; padding: 30px 0;
            transition: 0.5s var(--ease);
        }
        nav.scrolled {
            padding: 15px 0; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--font-display); font-weight: 800; font-size: 26px; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        
        .nav-links { display: flex; gap: 40px; list-style: none; align-items: center; }
        .nav-links a { font-size: 11px; font-weight: 600; text-decoration: none; color: var(--text-med); text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }
        
        .menu-toggle { display: none; background: none; border: none; cursor: pointer; padding: 10px; z-index: 1100; }
        .menu-toggle span { display: block; width: 25px; height: 2px; background: #fff; margin: 5px 0; transition: 0.3s; }

        .mobile-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1050; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 30px;
            transform: translateX(100%); transition: 0.6s var(--ease);
        }
        .mobile-overlay.active { transform: translateX(0); }
        .mobile-overlay a { font-family: var(--font-display); font-size: 32px; color: #fff; text-decoration: none; }

        /* ════════════ HERO ════════════ */
        .hero { min-height: 85vh; display: flex; align-items: center; position: relative; padding-top: 100px; }
        .hero h1 {
            font-family: var(--font-display); font-size: clamp(40px, 12vw, 150px);
            line-height: 0.85; letter-spacing: -0.05em; margin-bottom: 40px;
        }
        .hero h1 span { color: var(--text-low); display: block; }
        .hero-desc { max-width: 750px; font-size: 1.4rem; color: var(--text-med); margin-bottom: 50px; font-weight: 300; }

        /* ════════════ TRUST BAR ════════════ */
        .trust-bar { padding: 40px 0; background: #080808; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); overflow: hidden; white-space: nowrap; }
        .logo-scroll { display: flex; gap: 80px; align-items: center; animation: scroll 30s linear infinite; width: max-content; }
        .tech-logo { height: 32px; filter: grayscale(100%) brightness(200%); opacity: 0.5; transition: 0.4s; }
        
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ════════════ EXPERIENCE ════════════ */
        .exp-container { max-width: 1000px; margin-top: 60px; }
        .exp-item { display: flex; gap: 40px; padding-bottom: 80px; position: relative; }
        .exp-item:not(:last-child)::after { content: ''; position: absolute; left: 7px; top: 30px; bottom: 0; width: 1px; background: var(--border); }
        .exp-dot { width: 15px; height: 15px; border-radius: 50%; background: var(--accent); margin-top: 8px; flex-shrink: 0; position: relative; z-index: 2; box-shadow: 0 0 15px var(--accent); }
        .exp-content h3 { font-family: var(--font-display); font-size: 28px; margin-bottom: 5px; }
        .exp-meta { font-size: 14px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; }
        .exp-desc { color: var(--text-high); font-size: 18px; margin-bottom: 20px; font-weight: 500; }
        .exp-bullets { list-style: none; }
        .exp-bullets li { position: relative; padding-left: 25px; font-size: 15px; color: var(--text-med); margin-bottom: 12px; }
        .exp-bullets li::before { content: '→'; position: absolute; left: 0; color: var(--accent); }
         /* ════════════ CREDENTIALS & SKILLS ════════════ */
        .cred-section { background: #080808; padding: 100px 0; }
        .skills-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin-top: 60px; }
        .skill-group h4 { font-family: var(--font-display); font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 25px; }
        .skill-list li { font-size: 18px; color: #fff; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; list-style: none; }
        .skill-list li::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }

        .cert-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 80px; }
        .cert-card { background: var(--card); padding: 35px; border-radius: 24px; border: 1px solid var(--border); transition: 0.4s; }
        .cert-card:hover { border-color: var(--accent); }

       <!-- THE METHODOLOGY -->
        <section id="process" style="background:#050505;">
            <div class="container">
                <h2 style="font-family:var(--font-display); font-size:48px; margin-bottom:10px;">The Methodology</h2>
                <p style="color:var(--text-med); margin-bottom:40px; max-width:600px;">A comprehensive 16-step operational framework designed for scalable product excellence.</p>
                
                <div class="process-grid reveal">
                    <div class="process-step"><span class="step-num">01</span><h3>Discovery</h3><p>Defining objectives and stakeholder alignment.</p></div>
                    <div class="process-step"><span class="step-num">02</span><h3>Research</h3><p>User interviews and competitive market audits.</p></div>
                    <div class="process-step"><span class="step-num">03</span><h3>Define</h3><p>Synthesizing insights into actionable personas.</p></div>
                    <div class="process-step"><span class="step-num">04</span><h3>Information Architecture</h3><p>Structuring data for optimal findability.</p></div>
                    <div class="process-step"><span class="step-num">05</span><h3>User Flows</h3><p>Mapping logical paths through the application.</p></div>
                    <div class="process-step"><span class="step-num">06</span><h3>Wireframes</h3><p>Low-fidelity structural blueprints.</p></div>
                    <div class="process-step"><span class="step-num">07</span><h3>UI Design</h3><p>High-fidelity visual interface craft.</p></div>
                    <div class="process-step"><span class="step-num">08</span><h3>Design System</h3><p>Atomic components and documentation.</p></div>
                    <div class="process-step"><span class="step-num">09</span><h3>Prototyping</h3><p>Interactive simulations for stakeholder review.</p></div>
                    <div class="process-step"><span class="step-num">10</span><h3>Usability Testing</h3><p>Validating designs with real users.</p></div>
                    <div class="process-step"><span class="step-num">11</span><h3>Iteration</h3><p>Refining solutions based on test feedback.</p></div>
                    <div class="process-step"><span class="step-num">12</span><h3>Developer Handoff</h3><p>Clean specs, assets, and token exports.</p></div>
                    <div class="process-step"><span class="step-num">13</span><h3>Launch</h3><p>Production deployment and QA support.</p></div>
                    <div class="process-step"><span class="step-num">14</span><h3>Analytics</h3><p>Tracking user behavior and KPI tracking.</p></div>
                    <div class="process-step"><span class="step-num">15</span><h3>Optimization</h3><p>Continuous enhancement and A/B testing.</p></div>
                    <div class="process-step" style="border-color:var(--accent); background:var(--accent-muted);"><span class="step-num">16</span><h3 style="color:var(--accent);">Scale</h3><p style="color:var(--text-high);">Growing the product ecosystem.</p></div>
                </div>
            </div>
        </section>

        <!-- WORK -->
        <section id="work" class="container">
            <h2 style="font-family:var(--font-display); font-size:48px; margin-bottom:10px;">Case Studies</h2>
            <div class="work-grid">
                <div class="project-card reveal">
                    <div class="p-img-box"><img src="1001755783.png" class="p-img" alt="Prime Estimate"></div>
                    <div class="p-content">
                        <span class="p-tag">FinTech SaaS</span>
                        <h3 style="font-size:28px; font-family:var(--font-display);">Prime Estimate</h3>
                    </div>
                </div>
                <div class="project-card reveal">
                    <div class="p-img-box"><img src="1001755792.png" class="p-img" alt="GoRook"></div>
                    <div class="p-content">
                        <span class="p-tag">Public Safety</span>
                        <h3 style="font-size:28px; font-family:var(--font-display);">GoRook Emergency</h3>
                    </div>
                </div>
            </div>
        </section>

        <!-- TESTIMONIALS -->
        <section id="testimonials" class="container">
            <h2 style="font-family:var(--font-display); font-size:48px; margin-bottom:10px;">Vouched For</h2>
            <div class="testimonial-grid">
                <div class="testi-card reveal">
                    <p class="testi-quote">"Nawaz has a rare ability to understand complex business logic and turn it into a beautiful, simple interface."</p>
                    <div class="testi-author">
                        <div class="testi-avatar">MR</div>
                        <div class="testi-info"><h4>Michael Ross</h4><p>Product Head, Prime Estimate</p></div>
                    </div>
                </div>
                <div class="testi-card reveal">
                    <p class="testi-quote">"He doesn't just design screens; he designs solutions. Highly recommended for any serious SaaS team."</p>
                    <div class="testi-author">
                        <div class="testi-avatar">SJ</div>
                        <div class="testi-info"><h4>Sarah Jenkins</h4><p>Founder, GoRook</p></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- SERVICES -->
        <section id="services" style="background:#080808;">
            <div class="container">
                <h2 style="font-family:var(--font-display); font-size:48px; margin-bottom:50px;">Engagement Models</h2>
                <div class="services-grid">
                    <div class="service-card reveal"><span class="price-badge">Strategic Audit</span><h3>UX Audit</h3><h4 style="font-size:32px; color:var(--accent);">$1,200</h4></div>
                    <div class="service-card reveal" style="background:#1a1a1a;"><span class="price-badge" style="background:var(--accent); color:#000;">Main Focus</span><h3>Product Redesign</h3><h4 style="font-size:32px; color:#fff;">$4,500</h4></div>
                    <div class="service-card reveal"><span class="price-badge">Retainer</span><h3>Lead Partnership</h3><h4 style="font-size:32px; color:var(--accent);">Custom</h4></div>
                </div>
            </div>
        </section>

        <!-- CONTACT -->
        <section id="contact" class="container">
            <h2 style="font-family:var(--font-display); font-size:48px; margin-bottom:10px;">Contact</h2>
            <div class="contact-flex">
                <div class="contact-info reveal">
                    <p style="font-size:20px; color:var(--text-med); margin-bottom:40px;">Ready to elevate your product's user experience?</p>
                    <a href="mailto:allahnawazmalik175@gmail.com" style="color:#fff; text-decoration:none; font-size:18px;">allahnawazmalik175@gmail.com</a>
                </div>
                <form class="contact-form reveal">
                    <div class="form-group"><label>Full Name</label><input type="text"></div>
                    <div class="form-group"><label>Email</label><input type="email"></div>
                    <div class="form-group"><label>Message</label><textarea rows="4"></textarea></div>
                    <button class="submit-btn" type="button">Send Inquiry</button>
                </form>
            </div>
        </section>
    </main>

    <footer style="padding: 60px 0; border-top: 1px solid var(--border); background: #000;">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
            <a href="#" class="logo">NAWAZ<span>.</span></a>
            <p style="color:var(--text-low); font-size:13px;">© 2026 Allah Nawaz · Product Design Executive</p>
        </div>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((e) => { if(e.isIntersecting) e.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
        });

        function toggleMenu() {
            document.getElementById('mobileOverlay').classList.toggle('active');
        }
    </script>
</body>
</html>
