    <style>
        :root {
            --bg: #050505;
            --surface: #0E0E0E;
            --card: #161616;
            --accent: #D4F40C; 
            --accent-muted: rgba(212, 244, 12, 0.1);
            --border: rgba(255, 255, 255, 0.08);
            --text-high: #FFFFFF;
            --text-med: #A0A0A0;
            --text-low: #555555;
            --font-display: 'Syne', sans-serif;
            --font-body: 'Inter', sans-serif;
            --ease: cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body { 
            background: var(--bg); 
            color: var(--text-high); 
            font-family: var(--font-body); 
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 5vw; }
        section { padding: 100px 0; }
        
        .reveal { opacity: 0; transform: translateY(40px); transition: 1s var(--ease); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* ════════════ NAV ════════════ */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000; padding: 30px 0;
            transition: 0.5s var(--ease);
        }
        nav.scrolled {
            padding: 15px 0; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--font-display); font-weight: 800; font-size: 26px; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        
        .nav-links { display: flex; gap: 40px; list-style: none; align-items: center; }
        .nav-links a { font-size: 11px; font-weight: 600; text-decoration: none; color: var(--text-med); text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }
        
        .menu-toggle { display: none; background: none; border: none; cursor: pointer; padding: 10px; z-index: 1100; }
        .menu-toggle span { display: block; width: 25px; height: 2px; background: #fff; margin: 5px 0; transition: 0.3s; }

        .mobile-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1050; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 30px;
            transform: translateX(100%); transition: 0.6s var(--ease);
        }
        .mobile-overlay.active { transform: translateX(0); }
        .mobile-overlay a { font-family: var(--font-display); font-size: 32px; color: #fff; text-decoration: none; }

        /* ════════════ HERO ════════════ */
        .hero { min-height: 90vh; display: flex; align-items: center; position: relative; padding-top: 100px; }
        .hero h1 {
            font-family: var(--font-display); font-size: clamp(40px, 10vw, 120px);
            line-height: 0.85; letter-spacing: -0.05em; margin-bottom: 40px;
        }
        .hero h1 span { color: var(--text-low); display: block; }
        .hero-desc { max-width: 650px; font-size: 1.4rem; color: var(--text-med); margin-bottom: 50px; font-weight: 300; }

        .social-bar { display: flex; gap: 15px; }
        .social-icon { 
            width: 54px; height: 54px; border: 1px solid var(--border); 
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            background: var(--surface); transition: 0.4s var(--ease);
        }
        .social-icon svg { width: 22px; height: 22px; fill: var(--text-med); }
        .social-icon:hover { border-color: var(--accent); transform: translateY(-5px); }
        .social-icon:hover svg { fill: var(--accent); }

        /* ════════════ PROJECTS (BENTO GRID) ════════════ */
        .work-grid { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 20px; 
            margin-top: 60px; 
        }
        .project-card { 
            text-decoration: none; 
            color: inherit; 
            background: var(--surface); 
            border-radius: 32px; 
            overflow: hidden; 
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.4s var(--ease);
        }
        .project-card:hover { border-color: var(--accent); }
        .span-4 { grid-column: span 4; }
        .span-6 { grid-column: span 6; }
        .span-8 { grid-column: span 8; }
        
        .p-img-box { width: 100%; height: 400px; background: #111; overflow: hidden; position: relative; }
        .p-img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s var(--ease); }
        .project-card:hover .p-img { transform: scale(1.05); }
        
        .p-content { padding: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
        .p-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; display: block; }
        .p-title { font-family: var(--font-display); font-size: 24px; }

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((e) => { if(e.isIntersecting) e.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
