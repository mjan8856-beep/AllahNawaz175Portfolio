<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allah Nawaz — Product Designer</title>

<!-- SEO -->
<meta name="description" content="Allah Nawaz — Product Designer crafting high-conversion digital experiences. UI/UX, Web & Product Design.">
<meta name="keywords" content="UI UX Designer, Product Designer, Portfolio, Figma Designer">
<meta name="author" content="Allah Nawaz">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050505;
  --fg:#ffffff;
  --muted:#9ca3af;
  --border:rgba(255,255,255,0.08);
  --glass:rgba(255,255,255,0.03);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--fg);
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 24px;
  border-radius:999px;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,0.6);
  border:1px solid var(--border);
  display:flex;
  gap:20px;
  z-index:100;
}

nav a{
  color:var(--muted);
  text-decoration:none;
  font-size:14px;
  transition:0.3s;
}
nav a:hover{color:#fff}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:clamp(48px,10vw,120px);
  line-height:1;
  font-weight:700;
}

.hero p{
  margin-top:20px;
  color:var(--muted);
  max-width:500px;
}

.btn{
  margin-top:30px;
  padding:14px 28px;
  border-radius:999px;
  background:#fff;
  color:#000;
  border:none;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover{transform:scale(1.05);}

/* SECTION */
.section{
  padding:100px 20px;
  max-width:1200px;
  margin:auto;
}

.title{
  font-size:48px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

/* CARD */
.card{
  padding:24px;
  border-radius:20px;
  background:var(--glass);
  border:1px solid var(--border);
  backdrop-filter:blur(20px);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-5px);
  border-color:rgba(255,255,255,0.2);
}

/* FOOTER */
footer{
  padding:60px 20px;
  text-align:center;
  border-top:1px solid var(--border);
  color:var(--muted);
}

/* ANIMATION */
.fade{
  opacity:0;
  transform:translateY(20px);
  transition:0.8s;
}
.fade.show{
  opacity:1;
  transform:none;
}

</style>
</head>

<body>

<nav>
  <a href="#services">Services</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav>

<section class="hero">
  <h1>Allah Nawaz</h1>
  <p>Product Designer crafting high-conversion digital experiences.</p>
  <button class="btn" onclick="scrollToSection('contact')">Work With Me</button>
</section>

<section id="services" class="section fade">
  <h2 class="title">Services</h2>
  <div class="grid">
    <div class="card">UI/UX Design</div>
    <div class="card">Web Design</div>
    <div class="card">Product Design</div>
  </div>
</section>

<section id="projects" class="section fade">
  <h2 class="title">Projects</h2>
  <div class="grid">
    <div class="card">Brain Book</div>
    <div class="card">AI Influencer</div>
    <div class="card">Clevarex</div>
  </div>
</section>

<section id="contact" class="section fade">
  <h2 class="title">Contact</h2>
  <p>Email: mjan8856@gmail.com</p>
</section>

<footer>
  © 2026 Allah Nawaz — All Rights Reserved
</footer>

<script>
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* FADE IN */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll('.fade').forEach(el=>observer.observe(el));
</script>

</body>
</html>
